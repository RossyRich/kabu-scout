<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カブスカウト</title>
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #14171c;
    --panel: #191d24;
    --line: #262c36;
    --text: #e8e6e0;
    --muted: #8b93a1;
    --faint: #5a6270;
    --accent: #e8c15a;      /* 見出しの差し色（琥珀） */
    --up: #f2555a;          /* 日本式: 上昇=赤 */
    --down: #3fae7a;        /* 下落=緑 */
    --watch: #7f8ea8;
    --mono: "SF Mono", ui-monospace, "Menlo", "Consolas", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.7;
    font-size: 15px;
  }
  a { color: inherit; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px 80px; }

  /* ---------- ヘッダー ---------- */
  header {
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .head-inner {
    max-width: 880px; margin: 0 auto; padding: 14px 20px;
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  .brand {
    font-size: 17px; font-weight: 700; letter-spacing: 0.08em;
  }
  .brand small {
    font-family: var(--mono); font-size: 10px; color: var(--accent);
    letter-spacing: 0.25em; display: block; font-weight: 400;
  }
  .head-meta { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); text-align: right; }

  /* ---------- 日付タブ ---------- */
  .dates {
    display: flex; gap: 8px; overflow-x: auto; padding: 16px 0 4px;
    scrollbar-width: none;
  }
  .dates::-webkit-scrollbar { display: none; }
  .date-tab {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em;
    padding: 6px 14px; border: 1px solid var(--line); border-radius: 999px;
    background: none; color: var(--muted); cursor: pointer; white-space: nowrap;
  }
  .date-tab.active { border-color: var(--accent); color: var(--accent); }

  /* ---------- 対象日バナー ---------- */
  .target {
    margin: 20px 0 8px;
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  .target h1 { font-size: 26px; font-weight: 800; letter-spacing: 0.02em; }
  .target .sub { font-family: var(--mono); font-size: 11px; color: var(--faint); }

  /* ---------- 市況パネル ---------- */
  .market {
    background: linear-gradient(180deg, var(--panel), var(--bg2));
    border: 1px solid var(--line); border-radius: 10px;
    padding: 20px 22px; margin: 18px 0 30px;
  }
  .market .summary { font-size: 15px; margin-bottom: 16px; }
  .points {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px; background: var(--line); border: 1px solid var(--line);
    border-radius: 6px; overflow: hidden; margin-bottom: 16px;
  }
  .point { background: var(--bg2); padding: 10px 12px; }
  .point .label { font-size: 11px; color: var(--faint); letter-spacing: 0.08em; }
  .point .value { font-family: var(--mono); font-size: 14px; font-weight: 600; margin: 2px 0; }
  .point .note { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .outlook { border-left: 3px solid var(--accent); padding: 4px 0 4px 14px; }
  .outlook .lbl { font-size: 11px; color: var(--accent); letter-spacing: 0.2em; font-family: var(--mono); }
  .outlook p { font-size: 14.5px; margin-top: 4px; }
  .themes { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
  .theme-chip {
    font-size: 12px; padding: 3px 12px; border-radius: 999px;
    background: rgba(232,193,90,0.08); color: var(--accent);
    border: 1px solid rgba(232,193,90,0.25);
  }

  /* ---------- トレードプラン ---------- */
  .plans { margin-bottom: 40px; }
  .plans-head {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin-bottom: 6px;
  }
  .plans-head .no { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.15em; }
  .plans-head h2 { font-size: 18px; font-weight: 800; letter-spacing: 0.04em; }
  .plans-caution { font-size: 11.5px; color: var(--faint); margin-bottom: 14px; }
  .plan-note {
    font-size: 14px; color: var(--text);
    background: rgba(232,193,90,0.06); border: 1px solid rgba(232,193,90,0.2);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 14px;
  }
  .plan {
    border: 1px solid var(--line); border-radius: 10px; background: var(--bg2);
    padding: 16px 18px 14px; margin-bottom: 12px; position: relative; overflow: hidden;
  }
  .plan.buy   { border-left: 3px solid var(--up); }
  .plan.sell  { border-left: 3px solid var(--down); }
  .plan.avoid { border-left: 3px solid var(--watch); opacity: 0.85; }
  .plan-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .plan-rank {
    font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--accent);
    line-height: 1; min-width: 30px;
  }
  .conf { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); display: flex; align-items: center; gap: 7px; }
  .conf b { color: var(--text); font-size: 14px; }
  .conf .max { color: var(--faint); }
  .conf-bar {
    width: 64px; height: 4px; border-radius: 2px; background: var(--line);
    overflow: hidden; display: inline-block;
  }
  .conf-bar span { display: block; height: 100%; background: var(--accent); border-radius: 2px; }
  .plan-basis { font-size: 11.5px; color: var(--accent); margin-bottom: 8px; }
  .plan-scenario { font-size: 14px; margin-bottom: 12px; }
  .plan-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1px; background: var(--line); border: 1px solid var(--line);
    border-radius: 6px; overflow: hidden;
  }
  .plan-cell { background: var(--bg2); padding: 9px 12px; }
  .plan-cell .lbl { font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 0.12em; }
  .plan-cell p { font-size: 12.5px; color: var(--muted); margin-top: 2px; line-height: 1.6; }

  /* ---------- フィルタ ---------- */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; align-items: center; }
  .chip {
    font-size: 12.5px; padding: 5px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: none; color: var(--muted); cursor: pointer;
  }
  .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }
  #q {
    flex: 1; min-width: 140px;
    background: var(--bg2); border: 1px solid var(--line); border-radius: 999px;
    color: var(--text); padding: 6px 14px; font-size: 13px; outline: none;
    font-family: inherit;
  }
  #q:focus { border-color: var(--muted); }

  /* ---------- セクション ---------- */
  .section { margin-bottom: 36px; }
  .section-head {
    display: flex; align-items: baseline; gap: 10px;
    border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 14px;
  }
  .section-head .no { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.15em; }
  .section-head h2 { font-size: 17px; font-weight: 700; letter-spacing: 0.04em; }
  .section-head .count { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-left: auto; }

  /* ---------- 銘柄カード ---------- */
  .card {
    border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg2); padding: 16px 18px; margin-bottom: 12px;
  }
  .card-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .dir {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 4px; letter-spacing: 0.05em;
  }
  .dir.up    { color: var(--up);    background: rgba(242,85,90,0.12); }
  .dir.down  { color: var(--down);  background: rgba(63,174,122,0.12); }
  .dir.watch { color: var(--watch); background: rgba(127,142,168,0.12); }
  .code { font-family: var(--mono); font-size: 13px; color: var(--accent); }
  .name { font-size: 16px; font-weight: 700; }
  .name a { text-decoration: none; }
  .name a:hover { text-decoration: underline; }
  .tag { font-size: 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 4px; padding: 1px 8px; }
  .price {
    font-family: var(--mono); font-size: 12px; text-decoration: none;
    padding: 2px 10px; border-radius: 4px; border: 1px solid var(--line);
    color: var(--text); background: var(--bg);
    display: inline-flex; gap: 7px; align-items: baseline; white-space: nowrap;
  }
  .price:hover { border-color: var(--accent); }
  .price .yen { color: var(--faint); font-size: 10px; }
  .price.up .chg { color: var(--up); }
  .price.down .chg { color: var(--down); }
  .headline { font-size: 14.5px; font-weight: 600; margin: 4px 0 6px; }
  .detail { font-size: 13.5px; color: var(--muted); }
  .links { margin-top: 10px; display: flex; gap: 14px; flex-wrap: wrap; }
  .links a {
    font-size: 12px; color: var(--faint); text-decoration: none;
    border-bottom: 1px dotted var(--faint);
  }
  .links a:hover { color: var(--accent); border-color: var(--accent); }
  .links a.src { color: var(--muted); }

  .empty { color: var(--faint); font-size: 13px; padding: 10px 0 20px; }
  .nodata { text-align: center; padding: 80px 20px; color: var(--muted); }

  footer {
    max-width: 880px; margin: 0 auto; padding: 24px 20px 40px;
    border-top: 1px solid var(--line);
    font-size: 11.5px; color: var(--faint); line-height: 1.8;
  }

  @media (max-width: 560px) {
    body { font-size: 14px; }
    .target h1 { font-size: 21px; }
    .points { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="brand">カブスカウト<small>STOCK RECON — DAILY</small></div>
    <div class="head-meta" id="collected"></div>
  </div>
</header>

<div class="wrap">
  <nav class="dates" id="dates"></nav>
  <main id="app"><div class="nodata">データがまだありません。夕方の自動収集後に表示されます。</div></main>
</div>

<footer>
  本ページは公開情報を自動収集した参考資料です。情報の正確性・網羅性は保証されません。
  数値や材料は必ず一次情報（適時開示・取引所発表等）でご確認ください。投資判断はご自身の責任でお願いします。
</footer>

<script src="data.js"></script>
<script>
(function () {
  const DATA = (window.KABU_DATA || []).slice();
  if (!DATA.length) return;

  let currentIdx = 0;
  let dirFilter = 'all';
  let query = '';

  const $ = (s) => document.querySelector(s);
  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

  const DIR_LABEL = { up: '▲ 買い注目', down: '▼ 売り警戒', watch: '◆ 様子見' };
  const SIDE_LABEL = { buy: '▲ 買い方向', sell: '▼ 売り方向', avoid: '◆ 見送り' };
  const SIDE_DIR = { buy: 'up', sell: 'down', avoid: 'watch' };
  // 自信度スコア。旧形式（高/中/低のみ）のデータはラベルから概算値に変換して並べ替えに使う
  const CONF_FALLBACK = { '高': 75, '中': 55, '低': 25 };
  const confScore = (p) => (typeof p.confidenceScore === 'number')
    ? p.confidenceScore : (CONF_FALLBACK[p.confidence] || 0);
  const WD = ['日', '月', '火', '水', '木', '金', '土'];

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return iso;
    return (d.getMonth() + 1) + '/' + d.getDate() + '（' + WD[d.getDay()] + '）';
  }

  function renderDates() {
    $('#dates').innerHTML = DATA.map((d, i) =>
      '<button class="date-tab' + (i === currentIdx ? ' active' : '') + '" data-i="' + i + '">' +
      esc(fmtDate(d.targetDate)) + ' 分</button>'
    ).join('');
    $('#dates').querySelectorAll('.date-tab').forEach(btn => {
      btn.addEventListener('click', () => { currentIdx = +btn.dataset.i; dirFilter = 'all'; query = ''; render(); });
    });
  }

  // 直近営業日の終値チップ。クリックで株探チャートへ
  function priceChip(day, code) {
    const pr = day.prices && day.prices[code];
    if (!code || !pr || !pr.close || pr.close === '不明') return '';
    const ch = pr.change || '';
    const cls = ch.indexOf('-') === 0 ? 'down' : (ch.indexOf('+') === 0 ? 'up' : '');
    return '<a class="price ' + cls + '" href="https://kabutan.jp/stock/chart/?code=' + esc(code) +
      '" target="_blank" rel="noopener" title="クリックでチャートを開く">' +
      '終値 ' + esc(pr.close) + '<span class="yen">円</span>' +
      (ch ? '<span class="chg">' + esc(ch) + '</span>' : '') + '</a>';
  }

  function itemMatches(item) {
    if (dirFilter !== 'all' && item.direction !== dirFilter) return false;
    if (query) {
      const hay = [item.code, item.name, item.tag, item.headline, item.detail].join(' ').toLowerCase();
      if (!hay.includes(query.toLowerCase())) return false;
    }
    return true;
  }

  function cardHTML(item, day) {
    const dir = DIR_LABEL[item.direction] ? item.direction : 'watch';
    const nameInner = item.code
      ? '<a href="https://kabutan.jp/stock/?code=' + esc(item.code) + '" target="_blank" rel="noopener">' + esc(item.name) + '</a>'
      : esc(item.name);
    const extLinks = item.code
      ? '<a href="https://kabutan.jp/stock/chart/?code=' + esc(item.code) + '" target="_blank" rel="noopener">チャート</a>' +
        '<a href="https://finance.yahoo.co.jp/quote/' + esc(item.code) + '.T" target="_blank" rel="noopener">Yahoo!板</a>'
      : '';
    const srcLinks = (item.sources || []).map(s =>
      '<a class="src" href="' + esc(s.url) + '" target="_blank" rel="noopener">出典: ' + esc(s.label) + '</a>'
    ).join('');
    return '<article class="card">' +
      '<div class="card-top">' +
        '<span class="dir ' + dir + '">' + DIR_LABEL[dir] + '</span>' +
        (item.code ? '<span class="code">' + esc(item.code) + '</span>' : '') +
        '<span class="name">' + nameInner + '</span>' +
        (item.tag ? '<span class="tag">' + esc(item.tag) + '</span>' : '') +
        priceChip(day, item.code) +
      '</div>' +
      '<div class="headline">' + esc(item.headline) + '</div>' +
      '<div class="detail">' + esc(item.detail) + '</div>' +
      '<div class="links">' + extLinks + srcLinks + '</div>' +
    '</article>';
  }

  function render() {
    renderDates();
    const d = DATA[currentIdx];
    $('#collected').textContent = d.date + ' ' + (d.collectedAt || '') + ' 収集';

    let html = '<div class="target"><h1>' + esc(fmtDate(d.targetDate)) + ' の寄り付きに向けて</h1>' +
      '<span class="sub">' + esc(d.date) + ' 夕方時点の情報</span></div>';

    const m = d.market || {};
    html += '<section class="market">' +
      '<div class="summary">' + esc(m.summary) + '</div>' +
      '<div class="points">' + (m.points || []).map(p =>
        '<div class="point"><div class="label">' + esc(p.label) + '</div>' +
        '<div class="value">' + esc(p.value) + '</div>' +
        '<div class="note">' + esc(p.note) + '</div></div>'
      ).join('') + '</div>' +
      '<div class="outlook"><div class="lbl">OUTLOOK — 翌営業日の見通し</div><p>' + esc(m.outlook) + '</p></div>' +
      ((d.themes && d.themes.length)
        ? '<div class="themes">' + d.themes.map(t => '<span class="theme-chip">' + esc(t) + '</span>').join('') + '</div>'
        : '') +
    '</section>';

    if (d.plans && d.plans.items && d.plans.items.length) {
      html += '<section class="plans">' +
        '<div class="plans-head"><span class="no">PLAN</span><h2>翌朝のトレードプラン（参考シナリオ）</h2></div>' +
        '<div class="plans-caution">複数の情報源の重なりから自動生成した参考シナリオです。投資助言ではありません。売買の判断と結果はご自身の責任で。</div>' +
        (d.plans.note ? '<div class="plan-note">' + esc(d.plans.note) + '</div>' : '') +
        d.plans.items.slice().sort((a, b) => confScore(b) - confScore(a)).map((p, idx) => {
          const side = SIDE_DIR[p.side] ? p.side : 'avoid';
          const score = (typeof p.confidenceScore === 'number')
            ? Math.max(0, Math.min(100, Math.round(p.confidenceScore))) : null;
          const nameInner = p.code
            ? '<a href="https://kabutan.jp/stock/?code=' + esc(p.code) + '" target="_blank" rel="noopener">' + esc(p.name) + '</a>'
            : esc(p.name);
          const cells = [
            ['ENTRY — 入り方の目安', p.entry],
            ['EXIT — 撤退・無効化ライン', p.invalidation],
            ['RISK — 想定リスク', p.risk]
          ].filter(c => c[1]);
          return '<article class="plan ' + side + '">' +
            '<div class="plan-top">' +
              '<span class="plan-rank">' + (idx + 1) + '</span>' +
              '<span class="dir ' + SIDE_DIR[side] + '">' + SIDE_LABEL[side] + '</span>' +
              (p.code ? '<span class="code">' + esc(p.code) + '</span>' : '') +
              '<span class="name">' + nameInner + '</span>' +
              (p.stance ? '<span class="tag">' + esc(p.stance) + '</span>' : '') +
              priceChip(d, p.code) +
              (score !== null
                ? '<span class="conf">自信度 <b>' + score + '</b><span class="max">/100</span>' +
                  '<span class="conf-bar"><span style="width:' + score + '%"></span></span></span>'
                : (p.confidence ? '<span class="conf">自信度 <b>' + esc(p.confidence) + '</b></span>' : '')) +
            '</div>' +
            (p.basis ? '<div class="plan-basis">根拠の重なり: ' + esc(p.basis) + '</div>' : '') +
            '<div class="plan-scenario">' + esc(p.scenario) + '</div>' +
            (cells.length ? '<div class="plan-grid">' + cells.map(c =>
              '<div class="plan-cell"><div class="lbl">' + esc(c[0]) + '</div><p>' + esc(c[1]) + '</p></div>'
            ).join('') + '</div>' : '') +
          '</article>';
        }).join('') +
      '</section>';
    }

    html += '<div class="filters">' +
      ['all', 'up', 'down', 'watch'].map(f =>
        '<button class="chip' + (dirFilter === f ? ' active' : '') + '" data-f="' + f + '">' +
        (f === 'all' ? 'すべて' : DIR_LABEL[f]) + '</button>'
      ).join('') +
      '<input id="q" type="search" placeholder="銘柄名・コード・キーワードで絞り込み" value="' + esc(query) + '">' +
    '</div>';

    (d.sections || []).forEach((sec, i) => {
      const items = (sec.items || []).filter(itemMatches);
      html += '<section class="section">' +
        '<div class="section-head"><span class="no">0' + (i + 1) + '</span><h2>' + esc(sec.title) + '</h2>' +
        '<span class="count">' + items.length + ' / ' + (sec.items || []).length + '銘柄</span></div>' +
        (items.length ? items.map(it => cardHTML(it, d)).join('') : '<div class="empty">該当する銘柄はありません</div>') +
      '</section>';
    });

    $('#app').innerHTML = html;

    $('#app').querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => { dirFilter = btn.dataset.f; render(); });
    });
    const q = $('#q');
    q.addEventListener('input', () => {
      query = q.value;
      // 再描画せずカードだけ更新（入力フォーカス維持のため部分更新はせず、単純に再render後フォーカス復帰）
      const pos = q.selectionStart;
      render();
      const nq = $('#q');
      nq.focus();
      nq.setSelectionRange(pos, pos);
    });
  }

  render();
})();
</script>
</body>
</html>
