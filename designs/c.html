<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案C ターミナル — カブスカウト</title>
<style>
  :root {
    --bg: #060806;
    --bg2: #0b110c;
    --line: #1e3a24;
    --text: #cfe9d1;
    --muted: #86ab8c;
    --faint: #517a5a;
    --accent: #ffb000;
    --up: #ff6b5e;
    --down: #46e18a;
    --watch: #8fa8c9;
    --mono: "SF Mono", ui-monospace, "Menlo", "Osaka-Mono", "MS Gothic", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--mono);
    line-height: 1.75; font-size: 13.5px;
  }
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.16) 0 1px, transparent 1px 3px);
    opacity: 0.35;
  }
  a { color: inherit; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 0 18px 80px; }

  header { background: var(--accent); position: sticky; top: 0; z-index: 10; }
  .head-inner {
    max-width: 920px; margin: 0 auto; padding: 8px 18px;
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  .brand { font-size: 14px; font-weight: 700; letter-spacing: 0.15em; color: #100a00; }
  .brand small { font-size: 9px; color: #4d3c00; letter-spacing: 0.3em; display: block; font-weight: 700; }
  .head-meta { margin-left: auto; font-size: 11px; color: #4d3c00; font-weight: 700; }

  .dates { display: flex; gap: 6px; overflow-x: auto; padding: 14px 0 4px; scrollbar-width: none; }
  .dates::-webkit-scrollbar { display: none; }
  .date-tab {
    font-family: var(--mono); font-size: 12px; padding: 4px 12px;
    border: 1px solid var(--line); background: none; color: var(--muted); cursor: pointer; white-space: nowrap;
  }
  .date-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(255,176,0,0.08); }
  .date-tab::before { content: "["; color: var(--faint); }
  .date-tab::after { content: "]"; color: var(--faint); }

  .target { margin: 18px 0 6px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .target h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; color: var(--accent); }
  .target h1::before { content: ">> "; color: var(--faint); }
  .target .sub { font-size: 11px; color: var(--faint); }

  .market { border: 1px solid var(--line); background: var(--bg2); padding: 16px 18px; margin: 14px 0 28px; }
  .market .summary { font-size: 13.5px; margin-bottom: 14px; }
  .points {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 14px;
  }
  .point { background: var(--bg); padding: 8px 10px; }
  .point .label { font-size: 10px; color: var(--accent); letter-spacing: 0.15em; }
  .point .value { font-size: 14px; font-weight: 700; margin: 2px 0; }
  .point .note { font-size: 10.5px; color: var(--muted); line-height: 1.55; }
  .outlook { border: 1px dashed var(--line); padding: 10px 14px; }
  .outlook .lbl { font-size: 10px; color: var(--accent); letter-spacing: 0.25em; }
  .outlook p { font-size: 13px; margin-top: 4px; }
  .themes { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .theme-chip { font-size: 11px; padding: 2px 10px; color: var(--accent); border: 1px solid rgba(255,176,0,0.4); }
  .theme-chip::before { content: "#"; color: var(--faint); }

  .plans { margin-bottom: 36px; }
  .plans-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .plans-head::before { content: "════"; color: var(--line); }
  .plans-head::after { content: "════════════════"; color: var(--line); overflow: hidden; flex: 1; white-space: nowrap; }
  .plans-head .no { font-size: 10px; color: var(--accent); letter-spacing: 0.2em; }
  .plans-head h2 { font-size: 15px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); }
  .plans-caution { font-size: 10.5px; color: var(--faint); margin-bottom: 12px; }
  .plan-note { font-size: 13px; border: 1px solid rgba(255,176,0,0.35); background: rgba(255,176,0,0.05); padding: 10px 14px; margin-bottom: 12px; }
  .plan { border: 1px solid var(--line); background: var(--bg2); padding: 14px 16px 12px; margin-bottom: 10px; }
  .plan.buy   { border-left: 4px solid var(--up); }
  .plan.sell  { border-left: 4px solid var(--down); }
  .plan.avoid { border-left: 4px solid var(--watch); opacity: 0.9; }
  .plan-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .plan-rank { font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1; min-width: 26px; }
  .plan-rank::before { content: "#"; font-size: 12px; color: var(--faint); }
  .conf { margin-left: auto; font-size: 10.5px; color: var(--faint); display: flex; align-items: center; gap: 7px; }
  .conf b { color: var(--accent); font-size: 14px; }
  .conf-bar { width: 72px; height: 8px; background: var(--bg); border: 1px solid var(--line); overflow: hidden; display: inline-block; }
  .conf-bar span { display: block; height: 100%; background: repeating-linear-gradient(90deg, var(--accent) 0 4px, transparent 4px 6px); }
  .plan-basis { font-size: 11px; color: var(--accent); margin-bottom: 8px; }
  .plan-basis::before { content: "* "; color: var(--faint); }
  .plan-scenario { font-size: 13px; margin-bottom: 10px; }
  .plan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 1px; background: var(--line); border: 1px solid var(--line); }
  .plan-cell { background: var(--bg); padding: 8px 10px; }
  .plan-cell .lbl { font-size: 9px; color: var(--accent); letter-spacing: 0.15em; }
  .plan-cell p { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.65; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .chip { font-family: var(--mono); font-size: 12px; padding: 4px 12px; border: 1px solid var(--line); background: none; color: var(--muted); cursor: pointer; }
  .chip.active { background: var(--accent); color: #100a00; border-color: var(--accent); font-weight: 700; }
  #q {
    flex: 1; min-width: 140px; background: var(--bg2); border: 1px solid var(--line);
    color: var(--text); padding: 5px 12px; font-size: 12px; outline: none; font-family: var(--mono);
  }
  #q:focus { border-color: var(--accent); }

  .section { margin-bottom: 32px; }
  .section-head { display: flex; align-items: baseline; gap: 10px; border-bottom: 1px dashed var(--line); padding-bottom: 6px; margin-bottom: 12px; }
  .section-head .no { font-size: 10px; color: var(--accent); letter-spacing: 0.2em; }
  .section-head .no::before { content: "// "; color: var(--faint); }
  .section-head h2 { font-size: 14.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); }
  .section-head .count { font-size: 10.5px; color: var(--faint); margin-left: auto; }

  .card { border: 1px solid var(--line); background: var(--bg2); padding: 13px 15px; margin-bottom: 10px; }
  .card-top { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 5px; }
  .dir { font-size: 10.5px; font-weight: 700; padding: 1px 8px; letter-spacing: 0.05em; border: 1px solid currentColor; }
  .dir.up { color: var(--up); }
  .dir.down { color: var(--down); }
  .dir.watch { color: var(--watch); }
  .code { font-size: 12.5px; color: var(--accent); }
  .name { font-size: 14.5px; font-weight: 700; }
  .name a { text-decoration: none; }
  .name a:hover { text-decoration: underline; }
  .tag { font-size: 10.5px; color: var(--muted); border: 1px dashed var(--line); padding: 0 7px; }
  .price {
    font-size: 11.5px; text-decoration: none; padding: 1px 9px;
    border: 1px solid var(--line); color: var(--text); background: var(--bg);
    display: inline-flex; gap: 6px; align-items: baseline; white-space: nowrap;
  }
  .price:hover { border-color: var(--accent); color: var(--accent); }
  .price .yen { color: var(--faint); font-size: 9px; }
  .price.up .chg { color: var(--up); }
  .price.down .chg { color: var(--down); }
  .headline { font-size: 13px; font-weight: 700; margin: 3px 0 5px; }
  .detail { font-size: 12px; color: var(--muted); }
  .links { margin-top: 9px; display: flex; gap: 13px; flex-wrap: wrap; }
  .links a { font-size: 11px; color: var(--faint); text-decoration: none; }
  .links a::before { content: "["; }
  .links a::after { content: "]"; }
  .links a:hover { color: var(--accent); }

  .empty { color: var(--faint); font-size: 12px; padding: 10px 0 18px; }
  .nodata { text-align: center; padding: 80px 20px; color: var(--muted); }

  footer {
    max-width: 920px; margin: 0 auto; padding: 20px 18px 40px;
    border-top: 1px dashed var(--line);
    font-size: 10.5px; color: var(--faint); line-height: 1.8;
  }

  .switcher {
    position: fixed; bottom: 14px; right: 14px; z-index: 110;
    display: flex; gap: 6px; align-items: center;
    background: rgba(6,8,6,0.95); border: 1px solid var(--line); padding: 6px 10px;
  }
  .switcher a { font-size: 11px; color: var(--muted); text-decoration: none; padding: 2px 8px; }
  .switcher a:hover { color: var(--accent); }
  .switcher a.here { background: var(--accent); color: #100a00; font-weight: 700; }

  @media (max-width: 560px) {
    body { font-size: 12.5px; }
    .target h1 { font-size: 16px; }
    .points { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
