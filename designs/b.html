<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案B 朝刊 — 寄り付き前ブリーフィング</title>
<style>
  :root {
    --bg: #f4f0e5;
    --bg2: #faf7ee;
    --line: #cfc8b4;
    --rule: #26231c;
    --text: #26231c;
    --muted: #5d5747;
    --faint: #8b8471;
    --accent: #8f1d14;
    --up: #b3271b;
    --down: #1f5c3d;
    --watch: #57606f;
    --mincho: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Mincho Pro", serif;
    --mono: "SF Mono", ui-monospace, "Menlo", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mincho);
    line-height: 1.85;
    font-size: 15px;
  }
  a { color: inherit; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 0 22px 80px; }

  header { background: var(--bg); border-bottom: 3px double var(--rule); position: sticky; top: 0; z-index: 10; }
  .head-inner {
    max-width: 860px; margin: 0 auto; padding: 16px 22px 12px;
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  .brand { font-size: 21px; font-weight: 700; letter-spacing: 0.22em; }
  .brand small {
    font-family: var(--mono); font-size: 9px; color: var(--accent);
    letter-spacing: 0.3em; display: block; font-weight: 400; margin-top: 2px;
  }
  .head-meta { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); }

  .dates { display: flex; gap: 0; overflow-x: auto; padding: 14px 0 0; scrollbar-width: none; border-bottom: 1px solid var(--rule); }
  .dates::-webkit-scrollbar { display: none; }
  .date-tab {
    font-family: var(--mincho); font-size: 13px; letter-spacing: 0.1em;
    padding: 7px 18px; border: none; border-bottom: 3px solid transparent;
    background: none; color: var(--muted); cursor: pointer; white-space: nowrap;
  }
  .date-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 700; }

  .target { margin: 26px 0 10px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .target h1 { font-size: 30px; font-weight: 700; letter-spacing: 0.06em; }
  .target .sub { font-family: var(--mono); font-size: 11px; color: var(--faint); }

  .market { border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 20px 0; margin: 18px 0 34px; }
  .market .summary { font-size: 15.5px; margin-bottom: 18px; text-align: justify; }
  .points {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    border-top: 1px solid var(--line); border-left: 1px solid var(--line);
    margin-bottom: 18px;
  }
  .point { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 10px 12px; background: var(--bg2); }
  .point .label { font-size: 11px; color: var(--faint); letter-spacing: 0.15em; }
  .point .value { font-family: var(--mono); font-size: 14px; font-weight: 600; margin: 3px 0; }
  .point .note { font-size: 11px; color: var(--muted); line-height: 1.6; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
  .outlook { border-left: 2px solid var(--accent); padding: 2px 0 2px 16px; }
  .outlook .lbl { font-size: 10px; color: var(--accent); letter-spacing: 0.3em; font-family: var(--mono); }
  .outlook p { font-size: 15px; margin-top: 4px; text-align: justify; }
  .themes { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
  .theme-chip { font-size: 12px; padding: 2px 12px; border: 1px solid var(--rule); color: var(--text); background: var(--bg2); }

  .plans { margin-bottom: 44px; }
  .plans-head {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
    border-bottom: 3px double var(--rule); padding-bottom: 8px; margin-bottom: 8px;
  }
  .plans-head .no { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.3em; }
  .plans-head h2 { font-size: 20px; font-weight: 700; letter-spacing: 0.12em; }
  .plans-caution { font-size: 11px; color: var(--faint); margin-bottom: 16px; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
  .plan-note {
    font-size: 14.5px; background: var(--bg2); border: 1px solid var(--rule);
    padding: 14px 18px; margin-bottom: 18px; text-align: justify;
  }
  .plan { border: 1px solid var(--rule); background: var(--bg2); padding: 18px 20px 16px; margin-bottom: 14px; }
  .plan.buy   { border-left: 5px solid var(--up); }
  .plan.sell  { border-left: 5px solid var(--down); }
  .plan.avoid { border-left: 5px solid var(--watch); }
  .plan-top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .plan-rank { font-family: var(--mincho); font-size: 30px; font-weight: 700; color: var(--accent); line-height: 1; min-width: 32px; }
  .conf { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); display: flex; align-items: center; gap: 7px; }
  .conf b { color: var(--text); font-size: 15px; }
  .conf-bar { width: 64px; height: 3px; background: var(--line); overflow: hidden; display: inline-block; }
  .conf-bar span { display: block; height: 100%; background: var(--accent); }
  .plan-basis { font-size: 12px; color: var(--accent); margin-bottom: 8px; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
  .plan-scenario { font-size: 14.5px; margin-bottom: 14px; text-align: justify; }
  .plan-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    border-top: 1px solid var(--line); border-left: 1px solid var(--line);
  }
  .plan-cell { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 10px 12px; }
  .plan-cell .lbl { font-family: var(--mono); font-size: 9px; color: var(--faint); letter-spacing: 0.2em; }
  .plan-cell p { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.7; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }

  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 26px; align-items: center; }
  .chip {
    font-family: var(--mincho); font-size: 13px; padding: 4px 16px;
    border: 1px solid var(--rule); background: none; color: var(--muted); cursor: pointer;
  }
  .chip.active { background: var(--rule); color: var(--bg); font-weight: 700; }
  #q {
    flex: 1; min-width: 140px; background: var(--bg2); border: 1px solid var(--rule);
    color: var(--text); padding: 6px 14px; font-size: 13px; outline: none; font-family: inherit;
  }

  .section { margin-bottom: 40px; }
  .section-head {
    display: flex; align-items: baseline; gap: 12px;
    border-bottom: 1px solid var(--rule); padding-bottom: 8px; margin-bottom: 0;
  }
  .section-head .no { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.3em; }
  .section-head h2 { font-size: 18px; font-weight: 700; letter-spacing: 0.14em; }
  .section-head .count { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-left: auto; }

  .card { border-bottom: 1px solid var(--line); padding: 18px 2px 16px; }
  .card-top { display: flex; align-items: center; gap: 11px; flex-wrap: wrap; margin-bottom: 6px; }
  .dir { font-size: 11px; font-weight: 700; padding: 1px 9px; border: 1px solid currentColor; letter-spacing: 0.1em; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
  .dir.up { color: var(--up); }
  .dir.down { color: var(--down); }
  .dir.watch { color: var(--watch); }
  .code { font-family: var(--mono); font-size: 12.5px; color: var(--accent); }
  .name { font-size: 17px; font-weight: 700; letter-spacing: 0.04em; }
  .name a { text-decoration: none; }
  .name a:hover { text-decoration: underline; }
  .tag { font-size: 11px; color: var(--muted); border: 1px solid var(--line); padding: 0 8px; font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
  .price {
    font-family: var(--mono); font-size: 12px; text-decoration: none;
    padding: 1px 10px; border: 1px solid var(--rule); color: var(--text); background: var(--bg2);
    display: inline-flex; gap: 7px; align-items: baseline; white-space: nowrap;
  }
  .price:hover { background: var(--rule); color: var(--bg); }
  .price:hover .chg, .price:hover .yen { color: inherit; }
  .price .yen { color: var(--faint); font-size: 10px; }
  .price.up .chg { color: var(--up); }
  .price.down .chg { color: var(--down); }
  .headline { font-size: 15.5px; font-weight: 700; margin: 4px 0 6px; }
  .detail { font-size: 13px; color: var(--muted); font-family: "Hiragino Kaku Gothic ProN", sans-serif; text-align: justify; }
  .links { margin-top: 10px; display: flex; gap: 16px; flex-wrap: wrap; }
  .links a { font-size: 12px; color: var(--faint); text-decoration: none; border-bottom: 1px solid var(--line); font-family: "Hiragino Kaku Gothic ProN", sans-serif; }
  .links a:hover { color: var(--accent); border-color: var(--accent); }

  .empty { color: var(--faint); font-size: 13px; padding: 12px 0 20px; }
  .nodata { text-align: center; padding: 80px 20px; color: var(--muted); }

  footer {
    max-width: 860px; margin: 0 auto; padding: 24px 22px 40px;
    border-top: 3px double var(--rule);
    font-size: 11px; color: var(--faint); line-height: 1.9;
    font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  }

  .switcher {
    position: fixed; bottom: 14px; right: 14px; z-index: 50;
    display: flex; gap: 6px; align-items: center;
    background: rgba(244,240,229,0.95); border: 1px solid var(--rule); padding: 6px 10px;
  }
  .switcher a { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; padding: 2px 8px; }
  .switcher a:hover { color: var(--accent); }
  .switcher a.here { background: var(--rule); color: var(--bg); font-weight: 700; }

  @media (max-width: 560px) {
    body { font-size: 14px; }
    .target h1 { font-size: 23px; }
    .points { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
