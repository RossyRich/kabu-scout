<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案E マガジン — カブスカウト</title>
<style>
  :root {
    --bg: #10122a;
    --bg2: #181b3d;
    --line: #2d3163;
    --text: #f1f0ff;
    --muted: #a3a8d6;
    --faint: #6b71a8;
    --accent: #eaff00;
    --up: #ff5d7e;
    --down: #3ce8a4;
    --watch: #8f97c9;
    --mono: "SF Mono", ui-monospace, "Menlo", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.75; font-size: 15px;
  }
  a { color: inherit; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px 90px; }

  header { background: var(--bg); border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 10; }
  .head-inner {
    max-width: 880px; margin: 0 auto; padding: 14px 20px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .brand { font-size: 16px; font-weight: 900; letter-spacing: 0.02em; }
  .brand b, .brand { background: var(--accent); color: var(--bg); padding: 2px 10px; display: inline-block; transform: rotate(-1deg); }
  .brand small { font-family: var(--mono); font-size: 9px; letter-spacing: 0.25em; display: block; font-weight: 700; }
  .head-meta { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); }

  .dates { display: flex; gap: 8px; overflow-x: auto; padding: 16px 0 4px; scrollbar-width: none; }
  .dates::-webkit-scrollbar { display: none; }
  .date-tab {
    font-family: var(--mono); font-size: 12px; font-weight: 700; padding: 5px 14px;
    border: 2px solid var(--line); background: none; color: var(--muted); cursor: pointer; white-space: nowrap;
  }
  .date-tab.active { border-color: var(--accent); color: var(--accent); box-shadow: 3px 3px 0 rgba(234,255,0,0.35); }

  .target { margin: 26px 0 10px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .target h1 { font-size: 32px; font-weight: 900; letter-spacing: 0.01em; }
  .target h1 { text-shadow: 3px 3px 0 rgba(234,255,0,0.25); }
  .target .sub { font-family: var(--mono); font-size: 11px; color: var(--faint); }

  .market { border: 2px solid var(--line); background: var(--bg2); padding: 20px 22px; margin: 18px 0 34px; box-shadow: 6px 6px 0 rgba(0,0,0,0.35); }
  .market .summary { font-size: 15px; margin-bottom: 16px; }
  .points { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .point { border: 2px solid var(--line); background: var(--bg); padding: 9px 11px; }
  .point .label { font-size: 10.5px; color: var(--accent); letter-spacing: 0.12em; font-weight: 700; }
  .point .value { font-family: var(--mono); font-size: 14.5px; font-weight: 700; margin: 2px 0; }
  .point .note { font-size: 11px; color: var(--muted); line-height: 1.55; }
  .outlook { border: 2px dashed rgba(234,255,0,0.5); padding: 12px 16px; }
  .outlook .lbl { font-size: 10px; color: var(--accent); letter-spacing: 0.25em; font-family: var(--mono); font-weight: 700; }
  .outlook p { font-size: 14.5px; margin-top: 4px; }
  .themes { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
  .theme-chip {
    font-size: 12px; font-weight: 700; padding: 2px 12px;
    background: var(--accent); color: var(--bg); transform: rotate(-1deg);
  }
  .theme-chip:nth-child(even) { transform: rotate(1deg); }

  .plans { margin-bottom: 44px; }
  .plans-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .plans-head .no { font-family: var(--mono); font-size: 11px; font-weight: 700; background: var(--accent); color: var(--bg); padding: 2px 10px; }
  .plans-head h2 { font-size: 21px; font-weight: 900; letter-spacing: 0.02em; }
  .plans-caution { font-size: 11.5px; color: var(--faint); margin-bottom: 16px; }
  .plan-note {
    font-size: 14px; font-weight: 600; background: var(--bg2);
    border: 2px solid var(--accent); padding: 14px 18px; margin-bottom: 18px;
    box-shadow: 6px 6px 0 rgba(234,255,0,0.2);
  }
  .plan {
    border: 2px solid var(--line); background: var(--bg2);
    padding: 18px 20px 16px; margin-bottom: 18px; position: relative;
    box-shadow: 6px 6px 0 rgba(0,0,0,0.35);
  }
  .plan.buy   { border-color: var(--up);    box-shadow: 6px 6px 0 rgba(255,93,126,0.25); }
  .plan.sell  { border-color: var(--down);  box-shadow: 6px 6px 0 rgba(60,232,164,0.22); }
  .plan.avoid { border-color: var(--line); opacity: 0.9; }
  .plan-top { display: flex; align-items: center; gap: 11px; flex-wrap: wrap; margin-bottom: 5px; }
  .plan-rank {
    font-family: var(--mono); font-size: 40px; font-weight: 900; font-style: italic;
    color: var(--accent); line-height: 0.9; min-width: 44px;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
  }
  .conf { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); display: flex; align-items: center; gap: 7px; }
  .conf b { color: var(--accent); font-size: 17px; font-weight: 900; }
  .conf-bar { width: 68px; height: 8px; background: var(--bg); border: 1px solid var(--line); overflow: hidden; display: inline-block; }
  .conf-bar span { display: block; height: 100%; background: var(--accent); }
  .plan-basis { font-size: 11.5px; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
  .plan-scenario { font-size: 14px; margin-bottom: 12px; }
  .plan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
  .plan-cell { border: 2px solid var(--line); background: var(--bg); padding: 9px 12px; }
  .plan-cell .lbl { font-family: var(--mono); font-size: 9.5px; color: var(--accent); letter-spacing: 0.12em; font-weight: 700; }
  .plan-cell p { font-size: 12.5px; color: var(--muted); margin-top: 2px; line-height: 1.65; }

  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
  .chip {
    font-size: 12.5px; font-weight: 700; padding: 5px 14px;
    border: 2px solid var(--line); background: none; color: var(--muted); cursor: pointer;
  }
  .chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 3px 3px 0 rgba(0,0,0,0.4); }
  #q {
    flex: 1; min-width: 140px; background: var(--bg2); border: 2px solid var(--line);
    color: var(--text); padding: 6px 14px; font-size: 13px; outline: none; font-family: inherit;
  }
  #q:focus { border-color: var(--accent); }

  .section { margin-bottom: 40px; }
  .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .section-head .no { font-family: var(--mono); font-size: 11px; font-weight: 700; background: var(--text); color: var(--bg); padding: 2px 10px; }
  .section-head h2 { font-size: 18px; font-weight: 900; letter-spacing: 0.02em; }
  .section-head .count { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-left: auto; }

  .card {
    border: 2px solid var(--line); background: var(--bg2);
    padding: 15px 17px; margin-bottom: 14px; box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  }
  .card-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .dir { font-size: 11px; font-weight: 900; padding: 2px 9px; letter-spacing: 0.04em; color: var(--bg); }
  .dir.up { background: var(--up); }
  .dir.down { background: var(--down); }
  .dir.watch { background: var(--watch); }
  .code { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 700; }
  .name { font-size: 16px; font-weight: 900; }
  .name a { text-decoration: none; }
  .name a:hover { color: var(--accent); }
  .tag { font-size: 11px; font-weight: 700; color: var(--muted); border: 2px solid var(--line); padding: 0 8px; }
  .price {
    font-family: var(--mono); font-size: 12px; font-weight: 700; text-decoration: none;
    padding: 1px 10px; border: 2px solid var(--line); color: var(--text); background: var(--bg);
    display: inline-flex; gap: 7px; align-items: baseline; white-space: nowrap;
  }
  .price:hover { border-color: var(--accent); color: var(--accent); }
  .price .yen { color: var(--faint); font-size: 10px; }
  .price.up .chg { color: var(--up); }
  .price.down .chg { color: var(--down); }
  .headline { font-size: 14.5px; font-weight: 700; margin: 4px 0 6px; }
  .detail { font-size: 13px; color: var(--muted); }
  .links { margin-top: 10px; display: flex; gap: 14px; flex-wrap: wrap; }
  .links a { font-size: 12px; font-weight: 700; color: var(--faint); text-decoration: none; border-bottom: 2px solid var(--line); }
  .links a:hover { color: var(--accent); border-color: var(--accent); }

  .empty { color: var(--faint); font-size: 13px; padding: 10px 0 20px; }
  .nodata { text-align: center; padding: 80px 20px; color: var(--muted); }

  footer {
    max-width: 880px; margin: 0 auto; padding: 24px 20px 44px;
    border-top: 2px solid var(--accent);
    font-size: 11.5px; color: var(--faint); line-height: 1.8;
  }

  .switcher {
    position: fixed; bottom: 14px; right: 14px; z-index: 50;
    display: flex; gap: 6px; align-items: center;
    background: rgba(16,18,42,0.95); border: 2px solid var(--line); padding: 6px 10px;
  }
  .switcher a { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--muted); text-decoration: none; padding: 2px 8px; }
  .switcher a:hover { color: var(--accent); }
  .switcher a.here { background: var(--accent); color: var(--bg); }

  @media (max-width: 560px) {
    body { font-size: 14px; }
    .target h1 { font-size: 24px; }
    .points { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
